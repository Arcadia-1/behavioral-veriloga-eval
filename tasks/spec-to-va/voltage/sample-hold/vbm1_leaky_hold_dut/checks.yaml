syntax:
  must_include:
    - "@(cross("
    - "@(timer("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "capture_reaches_high_level"
    - "held_output_droops_over_time"
    - "reset_clears_output"
    - "second_capture_recovers"
parity:
  required: true
  tolerance_notes: "Check droop across wide windows, not a single exact timer tick."
