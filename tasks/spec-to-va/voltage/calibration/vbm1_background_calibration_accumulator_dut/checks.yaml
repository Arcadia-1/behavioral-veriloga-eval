syntax:
  must_include:
    - "@(cross("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reset_sample_near_0p45"
    - "accum_increments_then_decrements_then_recovers"
    - "accum_clamped_to_0p05_0p85"
parity:
  required: true
  tolerance_notes: "Use fixed safe-time samples after clock edges; ignore final raw row value."
