syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "rst"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reset_restores_midscale_trim"
    - "high_comp_windows_increase_trim"
    - "low_comp_windows_decrease_trim"
    - "trim_remains_within_0p05_to_0p85_clamp"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: comparator-driven trim update direction is reversed."
parity:
  required: true
  tolerance_notes: "Trim is sampled at 35ns, 75ns, 145ns, and 215ns, away from clock and comparator transition boundaries."
