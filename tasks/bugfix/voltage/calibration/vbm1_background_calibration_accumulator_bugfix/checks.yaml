syntax:
  must_include:
    - "@(cross("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reset_sample_near_0p45v"
    - "high_err_windows_increment_accumulator"
    - "low_err_windows_decrement_accumulator"
    - "accumulator_clamped_to_0p05_0p85v"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: error-update sign is reversed while reset, clamp, and transition output are unchanged."
release_gate:
  status: "evidence_only_duplicate_kernel"
  note: "Same accumulator sign-reversal kernel as vbm1_cdac_calibration_bugfix; retained as evidence but excluded from benchmark counts until a distinct defect is designed."
parity:
  required: true
  tolerance_notes: "Samples are taken away from clock edges and source transitions."
