syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "target"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reset_restores_nominal_gain_control"
    - "low_measurement_window_increases_gain_control"
    - "high_measurement_window_decreases_gain_control"
    - "gain_control_stays_within_clamp_range"
  sample_times_ns:
    - 20
    - 70
    - 100
    - 150
    - 178
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: measurement-error update direction is reversed."
parity:
  required: true
  tolerance_notes: "Samples are taken between clock edges and away from the 100-101 ns measurement transition."
