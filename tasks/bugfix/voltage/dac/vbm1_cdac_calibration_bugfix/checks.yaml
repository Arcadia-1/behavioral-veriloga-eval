syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "rst"
  must_not_include:
    - "I("
    - "ddt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reset_restores_nominal_trim"
    - "high_err_windows_increase_trim"
    - "low_err_windows_decrease_trim"
    - "trim_stays_within_clamp_range"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: err update direction is reversed."
parity:
  required: true
  tolerance_notes: "Voltage trim samples are checked at safe windows away from clock/source transition boundaries."
