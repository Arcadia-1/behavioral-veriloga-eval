syntax:
  must_include:
    - "ahdl_include"
    - "tran"
    - "save"
  must_not_include:
    []
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "trim_increases_on_high_comparator"
    - "trim_decreases_on_low_comparator"
    - "trim_recovers_on_late_high_comparator"
    - "trim_clamped"
parity:
  required: true
  tolerance_notes: "Use fixed post-clock sample windows."
