schema_version: "vabench-release-v2-checks"
task_id: "vbr1_l1_aperture_delay_track_and_hold:dut"
checker:
  task_id: "vbr1_l1_aperture_delay_track_and_hold"
  function: "check_vbm1_track_hold_aperture"
  source: "runners/simulate_evas.py"
syntax:
  policy: "behavior_first"
  must_include: []
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
  notes: "Do not require private variable names, timer variable names, or a fixed implementation template. Compile and behavior checks decide correctness."
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  dut_companion_role: "function_checked_dut"
  strong_benchmark_claim: true
  checks:
    - "sampled_values_match_aperture_delayed_input"
    - "held_output_remains_between_samples"
  public_observables:
    - "vin"
    - "clk"
    - "vout"
  public_behavior_envelope: "The public spec specifies a 200 ps aperture delay after each rising clock transition, delayed capture of vin rather than edge-time capture, held vout between delayed samples, broad held-level coverage, and smooth voltage-domain output transitions."
  private_sample_policy: "Internal checker samples vin at the aperture point and vout after a safe post-aperture settling window."
parity:
  required: true
  tolerance_notes: "Use post-aperture settled sample windows away from transition edges."
