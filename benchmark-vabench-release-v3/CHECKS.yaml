# Canonical v3 checker contracts. Each task key maps to the original
# checker configuration text used by the EVAS runner.
001-bang-bang-phase-detector: |
  version: 1
  task_id: v3_001_bang_bang_phase_detector
  backend: evas
  status: formal-candidate
  checker: v3_001_bang_bang_phase_detector
  required_columns:
    - time
    - data
    - clk
    - retimed_data
    - up
    - down
  checks:
    hidden:
      - up_on_data_edge_when_clk_high_retimed_low
      - down_on_data_edge_when_clk_low_retimed_high
      - no_output_for_non_direction_cases
      - clear_on_next_clk_transition
      - never_overlap_up_down
002-capacitive-sar-feedback-dac: |
  version: 1
  task_id: v3_002_capacitive_weighted_sar_feedback_dac
  backend: evas
  status: formal-candidate
  checker: v3_002_capacitive_weighted_sar_feedback_dac
  required_columns:
    - time
    - clk
    - d9
    - d8
    - d7
    - d6
    - d5
    - d4
    - d3
    - d2
    - d1
    - d0
    - cal0
    - cal1
    - vdac_p
    - vdac_n
  logic_threshold_v: 0.45
  output_tolerance_v: 0.003
  settle_after_rising_clk_s: 8.0e-10
  formula:
    main_code: "512*d9 + 256*d8 + 128*d7 + 64*d6 + 32*d5 + 16*d4 + 8*d3 + 4*d2 + 2*d1 + d0"
    cal_code: "cal0 + 2*cal1"
    effective_code: "main_code + 32*cal_code"
    vdiff: "0.6*((effective_code/1023.0)-0.5)"
    vdac_p: "0.45 + 0.5*vdiff"
    vdac_n: "0.45 - 0.5*vdiff"
  checks:
    hidden:
      - binary_code_sets_nominal_dac_level
      - calibration_bits_shift_feedback_level
      - differential_outputs_move_complementarily
      - common_mode_remains_0p45
      - full_hidden_sequence_matches_formula
