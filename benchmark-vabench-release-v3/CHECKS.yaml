006-element-shuffler: |
  version: 2
  task_id: element_shuffler
  backend: evas
  status: formal_candidate
  checker: fixed_time_onehot_sequence
  required_columns:
    - time
    - clk
    - rst_n
    - out0
    - out1
    - out2
    - out3
  logic_threshold_v: 0.45
  visible:
    testbench: test_visible/visible.scs
    sample_times_ns: [20, 40, 60, 80, 100, 120]
    expected_active_outputs: [out2, out0, out3, out1, out2, out0]
  hidden:
    testbench: test_hidden/hidden.scs
    sample_times_ns: [20, 40, 60, 80, 100, 120, 160, 180, 200, 220]
    expected_active_outputs: [out2, out0, out3, out1, out2, out0, out2, out0, out3, out1]
  checks:
    formal:
      - exactly_one_output_high_at_each_sample
      - visible_sequence_matches_out2_out0_out3_out1_repeat
      - hidden_sequence_matches_long_repeat
      - reset_restarts_sequence_before_second_window
  syntax:
    must_include:
      - "@(cross("
      - "transition("
    must_not_include:
      - "I("
      - "ddt("
      - "idt("
  notes:
    - "Trace signals are clk, rst_n, out0, out1, out2, out3."
    - "At each listed sample time, classify each output as high when V(out*) > 0.45 V and low otherwise."
    - "A passing waveform has exactly one high output per sample and the active output name equals expected_active_outputs."
    - "The hidden bench asserts rst_n low between the first and second windows; the second window must restart at out2."
    - "The release checker must enforce both the first window and the post-reset second window."
