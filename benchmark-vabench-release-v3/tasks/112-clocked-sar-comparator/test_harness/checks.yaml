syntax:
  must_include:
    - "@(cross("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - reset_both_high_when_clock_low
    - positive_and_negative_decisions_after_rising_edges
checker:
  task_id: "v3_source_clocked_sar_comparator"
parity:
  required: true
  tolerance_notes: "Compare stable sample windows and logical event behavior, not raw timestep equality."
