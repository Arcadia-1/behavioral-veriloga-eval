version: 2
task_id: first_order_lowpass
backend: evas
status: formal_candidate
checker: first_order_lowpass_step_response
required_columns:
  - time
  - vin
  - vout
syntax:
  must_include:
    - "@(timer("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  dut_companion_role: "function_checked_dut"
  strong_benchmark_claim: true
  checks:
    - "input_step_exercised"
    - "monotone_first_order_step_response"
    - "lagged_response_not_passthrough"
    - "vout_reaches_expected_late_level"
    - "bounded_without_overshoot"
  public_observables:
    - "vin"
    - "vout"
  scoring_logic: "Sample vin/vout away from PWL edges; compute expected y[n+1] = y[n] + 0.025*(vin[n]-y[n]) on the 500 ps timer grid; allow transition/safe-time tolerance while rejecting passthrough, wrong alpha, wrong polarity, clamp, stuck, overshoot, and nonmonotone trajectories."
parity:
  required: true
  tolerance_notes: "Use safe-time level windows to avoid judging the exact discrete update row."
