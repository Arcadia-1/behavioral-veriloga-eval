syntax:
  must_include:
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - pulse_after_each_input_crossing
    - output_returns_low_after_fixed_width
checker:
  task_id: "v3_crossing_pulse_detector"
parity:
  required: true
  tolerance_notes: "Compare stable sample windows and logical event behavior, not raw timestep equality."
