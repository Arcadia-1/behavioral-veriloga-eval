syntax:
  must_include:
    - "@(timer("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reference_clock_pre_step_period"
    - "reference_clock_post_step_period"
    - "reference_clock_switch_near_t_switch"
    - "reference_clock_50_percent_duty"
    - "reference_clock_voltage_rails"
  public_observables:
    - "CLK"
parity:
  reference: "spectre"
  status: "current_main_validated"
  notes:
    - "Visible smoke validates the default 20 ns to 19.5 ns step; hidden coverage validates an 18 ns to 22 ns legal override with an earlier switch time."
