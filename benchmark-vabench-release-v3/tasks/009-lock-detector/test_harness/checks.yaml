version: 1
task_id: v3_009_lock_detector
backend: evas
status: formal-candidate
checker: v3_009_lock_detector
required_columns:
  - time
  - ref_clk
  - fb_clk
  - rst_n
  - lock
syntax:
  must_include:
    - "@(cross("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
checks:
  visible:
    - reset_holds_lock_low
    - no_lock_before_third_aligned_reference_edge
    - lock_after_three_aligned_reference_edges
  hidden:
    - active_low_reset_clears_lock_and_counter
    - lock_low_before_three_good_edges
    - lock_high_after_three_consecutive_ref_fb_rising_edges_within_2ns
    - mismatched_feedback_edge_breaks_streak
    - no_early_lock_after_high_low_or_timing_mismatch
trace_logic:
  aligned_reference_event: "At each ref_clk rising threshold crossing while rst_n is high, the latest fb_clk rising threshold crossing must be within 2 ns."
  score: "Pass only if lock is low during reset and before the third consecutive aligned reference event, high after the third aligned event, low after an out-of-window reference event, and high again only after three new consecutive aligned events."
