syntax:
  must_include:
    - "@(cross("
    - "@(timer("
    - "transition("
    - "tran"
    - "save"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "adpll_ratio_hop_pre_ratio"
    - "adpll_ratio_hop_post_ratio"
    - "adpll_ratio_hop_feedback_divider_relation"
    - "adpll_ratio_hop_feedback_tracks_reference"
    - "adpll_ratio_hop_lock_reacquired"
  public_observables:
    - "ref_clk"
    - "ratio_ctrl"
    - "fb_clk"
    - "vout"
    - "vctrl_mon"
    - "lock"
parity:
  reference: "spectre"
  status: "pending_fresh_dual_rerun"
  notes:
    - "Gold/checker were strengthened on 2026-05-31 to require feedback-divider and feedback/reference tracking evidence."
    - "Targeted EVAS passes after the update; fresh Spectre rerun is required before restoring certified status."
