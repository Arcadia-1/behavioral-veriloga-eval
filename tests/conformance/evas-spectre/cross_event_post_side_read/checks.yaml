asset_type: evas_spectre_conformance
semantic_axis: event-sampling
expected_relation: waveform_equivalent
origin:
  source_main120_id: null
gold_sources:
  - gold/cross_event_post_side_read.va
  - gold/tb_cross_event_post_side_read.scs
compile:
  evas: pass
  spectre: pass
checks:
  - name: state_high_after_rising_cross
    intent: "The event body observes the post-rising side of the crossing."
    signal: state
    settled_window_s: [1.5e-8, 2.8e-8]
    min_v: 0.7
  - name: state_low_after_falling_cross
    intent: "The event body observes the post-falling side of the crossing."
    signal: state
    settled_window_s: [3.4e-8, 4.8e-8]
    max_v: 0.2
not_benchmark_task_reason: "This validates simulator cross-event sampling semantics, not a public circuit-function benchmark."
runner_hook_needed: "Add a waveform-equivalence conformance checker for post-cross event-body node reads."
