name: Public Agent Runtime

on:
  pull_request:
    paths:
      - ".github/workflows/public-agent-runtime.yml"
      - "environment/**"
      - "benchmark-vabench-release-v4/public-agent-runtime/**"
      - "benchmark-vabench-release-v4/operations/calibration_pilot/mini_swe_vabench.py"
      - "tests/test_mini_swe_vabench.py"
      - "benchmark-vabench-release-v4/scripts/tests/test_public_agent_runtime.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/public-agent-runtime.yml"
      - "environment/**"
      - "benchmark-vabench-release-v4/public-agent-runtime/**"
      - "benchmark-vabench-release-v4/operations/calibration_pilot/mini_swe_vabench.py"
      - "tests/test_mini_swe_vabench.py"

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check runtime contract
        run: python3 benchmark-vabench-release-v4/scripts/tests/test_public_agent_runtime.py

      - name: Build pinned runtime image
        working-directory: benchmark-vabench-release-v4/public-agent-runtime
        run: ./build.sh

      - name: Verify mounts and readable EVAS waveform
        working-directory: benchmark-vabench-release-v4/public-agent-runtime
        run: ./verify.sh

      - name: Verify mini-SWE Docker backend against the shared image
        env:
          VABENCH_TEST_DOCKER_RUNTIME: "1"
          VABENCH_TEST_DOCKER_IMAGE: "vabench-agent-runtime:0.8.3"
        run: |
          python3 -m pip install pytest
          python3 -m pytest -q tests/test_mini_swe_vabench.py -k shared_docker_image_executes_real_adapter_contract
