name: Runner Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install pytest jsonschema "mini-swe-agent==2.4.5"

      - name: Syntax check runner modules
        run: python -m py_compile runners/bridge_preflight.py runners/run_gold_dual_suite.py runners/gen_manifest.py runners/gen_weekly_summary.py runners/gen_paper_stats.py runners/_result_table_utils.py

      - name: Syntax check v4 release tools
        run: python -m py_compile benchmark-vabench-release-v4/operations/tri_form_derivation_prep/materialize_tri_form_release.py benchmark-vabench-release-v4/operations/tri_form_derivation_prep/score_denominator_registry.py benchmark-vabench-release-v4/operations/tri_form_derivation_prep/export_tri_form_runtime.py benchmark-vabench-release-v4/operations/tri_form_derivation_prep/audit_runtime_export.py benchmark-vabench-release-v4/operations/tri_form_derivation_prep/audit_tri_form_release.py benchmark-vabench-release-v4/operations/calibration_pilot/*.py benchmark-vabench-release-v4/runners/*.py benchmark-vabench-release-v4/scripts/render_v4_harness.py

      - name: Guard against automatic full-trace fallback
        run: |
          ! grep -RIn \
            -e 'VAEVAS_DISABLE_ROW_CHECKER_TRACE_FALLBACK' \
            -e 'auto_sparse_trace_fallback_full_trace' \
            -e 'fallback_full_trace' \
            -e '--allow-fallback' \
            runners scripts tests

      - name: Check result paths exist when coordination docs are present
        run: |
          python - <<'EOF'
          import pathlib, re, sys
          table_path = pathlib.Path("coordination/docs/benchmark/BENCHMARK_RESULT_TABLE.md")
          if not table_path.exists():
              print("Skipping result-path check: coordination docs are outside this standalone repo.")
              raise SystemExit(0)
          table = table_path.read_text(encoding="utf-8")
          paths = sorted(set(re.findall(r'behavioral-veriloga-eval/results/[\w\-/\.]+', table)))
          missing = [p for p in paths if not pathlib.Path(p).exists()]
          if missing:
              print("Missing result dirs:")
              print("\n".join(missing))
              sys.exit(1)
          EOF

      - name: Validate task dirs have required files
        run: |
          python - <<'EOF'
          import pathlib, sys
          bad = []
          for meta in pathlib.Path("tasks").rglob("meta.json"):
              task_dir = meta.parent
              required = {"prompt.md", "meta.json", "checks.yaml"}
              missing = sorted(required - {child.name for child in task_dir.iterdir()})
              if missing:
                  bad.append(f"{task_dir}: missing {missing}")
          if bad:
              print("\n".join(bad))
              sys.exit(1)
          EOF

      - name: Run runner smoke tests
        run: python -m pytest -q tests/test_bridge_preflight.py tests/test_bridge_scripts.py tests/test_run_gold_dual_suite.py tests/test_save_statements.py tests/test_pwl_statements.py tests/test_meta_schema.py

      - name: Run v4 materializer tests
        run: python -m pytest -q benchmark-vabench-release-v4/scripts/tests/test_tri_form_release_materializer.py benchmark-vabench-release-v4/scripts/tests/test_score_denominator_registry.py benchmark-vabench-release-v4/scripts/tests/test_r45_profile_parity_evidence.py tests/test_v4_r51_active_entrypoints.py tests/test_benchmarkv4_calibration_pilot.py tests/test_mini_swe_vabench.py

      - name: Guard immutable release trees and evidence
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          test -n "$BASE_SHA"
          git cat-file -e "$BASE_SHA^{commit}"
          git diff --exit-code "$BASE_SHA" -- \
            benchmark-vabench-release-v4/release/benchmarkv4 \
            benchmark-vabench-release-v4/release/benchmarkv4-r45 \
            benchmark-vabench-release-v4/evidence/r44 \
            benchmark-vabench-release-v4/evidence/r45
          if git cat-file -e "$BASE_SHA:benchmark-vabench-release-v4/release/benchmarkv4-r47" 2>/dev/null; then
            git diff --exit-code "$BASE_SHA" -- \
              benchmark-vabench-release-v4/release/benchmarkv4-r47 \
              benchmark-vabench-release-v4/evidence/r47
          fi

      - name: Rebuild and certify newly introduced R47
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          test -n "$BASE_SHA"
          git cat-file -e "$BASE_SHA^{commit}"
          if git cat-file -e "$BASE_SHA:benchmark-vabench-release-v4/release/benchmarkv4-r47" 2>/dev/null; then
            echo "R47 already exists in the base and is protected by the immutable-tree gate."
            exit 0
          fi
          if ! test -d benchmark-vabench-release-v4/release/benchmarkv4-r47; then
            echo "No R47 candidate is present; tooling-only validation is complete."
            exit 0
          fi
          python benchmark-vabench-release-v4/operations/tri_form_derivation_prep/score_denominator_registry.py \
            --source benchmark-vabench-release-v4/provenance/dut-base-v3-exact-five-hash-bound-v2
          python benchmark-vabench-release-v4/operations/tri_form_derivation_prep/rebuild_tri_form_release.py \
            --release-revision r47 \
            --release /tmp/benchmarkv4-r47 \
            >/dev/null
          jq -e '.status == "pass" and (.problems | length) == 0 and (.certification_problems | length) == 0' \
            /tmp/benchmarkv4-r47/AUDIT_REPORT.json >/dev/null
          diff -qr \
            /tmp/benchmarkv4-r47 \
            benchmark-vabench-release-v4/release/benchmarkv4-r47

  linux-sandbox:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bubblewrap test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          python -m pip install pytest

      - name: Exercise the Linux Bubblewrap security boundary
        run: python -m pytest -q tests/test_mini_swe_vabench.py -k bubblewrap
