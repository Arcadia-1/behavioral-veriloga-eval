syntax:
  must_include:
    - "module"
    - "analog"
  must_not_include:
    - "laplace_nd"
    - "white_noise"
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "time_interleaved_adc_mismatch_full_behavior"
    - "mismatch_metric_flow_near_miss_rejection"
negative_policy:
  required_partial_pass_negatives: 5
  zero_score_negatives_allowed: false
