syntax:
  must_include:
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "samples_on_rising_clock_edge"
    - "output_holds_between_edges"
    - "sample_value_tracks_input_at_edge"
parity:
  required: true
  tolerance_notes: "Check clock-edge sampling and inter-edge hold behavior under EVAS/Spectre."
