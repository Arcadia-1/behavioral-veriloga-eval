syntax:
  must_include:
    - "@(cross("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "sh_output_tracks_input_at_edges"
    - "sh_output_held_between_edges"

parity:
  required: true
  tolerance_notes: "Check clock-edge sampling and inter-edge hold behavior under EVAS/Spectre."
