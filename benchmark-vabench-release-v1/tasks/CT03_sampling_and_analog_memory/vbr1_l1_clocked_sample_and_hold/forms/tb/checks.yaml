syntax:
  must_include:
    - "ahdl_include"
    - "tran"
    - "save"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  dut_companion_role: "function_checked_tb"
  strong_benchmark_claim: true
  checks:
    - "sh_output_tracks_input_at_edges"
    - "sh_output_held_between_edges"
  public_observables:
    - "in"
    - "clk"
    - "out"
parity:
  required: true
  tolerance_notes: "Check the generated testbench through the supplied sample_hold DUT."
