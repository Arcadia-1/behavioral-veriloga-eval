syntax:
  must_include:
    - "ahdl_include"
    - "tran"
    - "save"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "aperture_delayed_sample_tracks_vin"
    - "hold_windows_show_bounded_droop"
    - "coarse_decision_matches_held_sample"
    - "valid_pulses_mark_completed_samples"
parity:
  required: true
  tolerance_notes: "L2 chain checks sample aperture, bounded droop, coarse decision, and valid pulse timing."
