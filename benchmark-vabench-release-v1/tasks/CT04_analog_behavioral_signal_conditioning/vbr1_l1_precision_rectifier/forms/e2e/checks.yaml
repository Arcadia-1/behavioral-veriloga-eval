syntax:
  must_include:
    - "ahdl_include"
    - "save"
    - "tran"
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "negative_input_rectifies_to_zero"
    - "positive_input_follows_input"
    - "near_zero_has_no_large_offset"
parity:
  required: true
  tolerance_notes: "Check level windows away from zero crossings."
