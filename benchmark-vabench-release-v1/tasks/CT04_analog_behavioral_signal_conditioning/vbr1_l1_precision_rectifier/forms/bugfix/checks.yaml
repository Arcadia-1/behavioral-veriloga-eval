syntax:
  must_include:
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "negative_input_windows_drive_vout_near_zero"
    - "positive_input_windows_follow_vin"
    - "return_to_negative_window_clears_vout"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: the negative branch outputs -vin instead of 0."
parity:
  required: true
  tolerance_notes: "Rectifier samples should use settled windows away from zero-crossing and PWL transition boundaries, e.g. 20 ns, 55 ns, 95 ns, and 115 ns."
