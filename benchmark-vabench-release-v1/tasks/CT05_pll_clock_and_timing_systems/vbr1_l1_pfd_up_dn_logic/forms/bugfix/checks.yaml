syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "UP"
    - "DN"
  must_not_include:
    - "I("
    - "ddt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "ref_leads_window_has_short_up_pulses_and_low_dn"
    - "div_leads_window_has_short_dn_pulses_and_low_up"
    - "both_high_overlap_fraction_is_bounded"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: DIV branch misses the both-high reset."
parity:
  required: true
  tolerance_notes: "PFD output windows use time-weighted fractions and pulse counts, not raw row counts."
