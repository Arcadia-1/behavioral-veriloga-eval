syntax:
  must_include:
    - "ahdl_include"
    - "tran"
    - "save"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  dut_companion_role: "function_checked_dut"
  strong_benchmark_claim: true
  checks:
    - "input_up_down_steps_exercised"
    - "rising_slew_is_limited"
    - "high_level_eventually_reached"
    - "falling_slew_is_limited"
    - "low_level_eventually_reached"
    - "lagged_response_not_passthrough"
  public_observables:
    - "vin"
    - "vout"
parity:
  required: true
  tolerance_notes: "Use level windows; do not require exact per-row step size at transition boundaries."
