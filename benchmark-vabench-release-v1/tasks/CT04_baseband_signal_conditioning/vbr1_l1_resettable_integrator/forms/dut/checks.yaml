syntax:
  must_include:
    - "@(timer("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  dut_companion_role: "function_checked_dut"
  strong_benchmark_claim: true
  checks:
    - "input_drive_present"
    - "reset_pulse_exercised"
    - "pre_reset_output_integrates_up"
    - "reset_clears_integrator"
    - "post_reset_integration_restarts"
  public_observables:
    - "vin"
    - "rst"
    - "vout"
parity:
  required: true
  tolerance_notes: "Use post-reset safe windows rather than exact reset-edge samples."
