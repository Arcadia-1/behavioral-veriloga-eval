syntax:
  must_include:
    - "tran"
    - "save"
  must_not_include:
    - "I("
    - "ddt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "amplified_input"
    - "preamp_monitor_matches_metric"
    - "two_pole_internal_lag_visible"
    - "filtered_output_lags_input"
    - "metric_tracks_settling"
    - "settle_status_asserts_after_output_recovery"
parity:
  reference: "spectre"
  status: "certified"
  notes:
    - "Current release dual_certification report certifies this form as EVAS/Spectre pass; rerun is required after checker/gold behavior changes."
