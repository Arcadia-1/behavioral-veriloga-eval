syntax:
  must_include:
    - "ahdl_include"
    - "tran"
    - "save"
  must_not_include:
    []
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "below_range_clamps_to_0p18"
    - "inside_range_follows_raw_level"
    - "above_range_clamps_to_0p72"
parity:
  required: true
  tolerance_notes: "Check stable level windows away from source transition times."
