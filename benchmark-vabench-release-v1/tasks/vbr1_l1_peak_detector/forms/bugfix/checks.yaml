syntax:
  must_include:
    - "@(timer("
    - "transition("
    - "peak"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "first_peak_window_tracks_input_peak"
    - "reset_window_clears_stored_peak"
    - "post_reset_window_tracks_new_higher_peak"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: buggy source ignores reset and never clears the stored peak."
parity:
  required: true
  tolerance_notes: "Sample vout away from reset and PWL transition boundaries: recommended windows at 80 ns, 128 ns, and 165 ns."
