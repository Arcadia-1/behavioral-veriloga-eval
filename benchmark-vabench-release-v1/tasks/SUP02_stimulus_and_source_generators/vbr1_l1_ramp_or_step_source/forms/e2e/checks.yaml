syntax:
  must_include:
    - "@(initial_step)"
    - "@(timer("
    - "$bound_step("
    - "transition("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "periodic_phase_ramp_guard_pulse"
parity:
  required: true
  tolerance_notes: "Compare phase-ramp wrap count, guard pulse count/width fraction, and waveform observability; do not score solver-step implementation details as the circuit function."
