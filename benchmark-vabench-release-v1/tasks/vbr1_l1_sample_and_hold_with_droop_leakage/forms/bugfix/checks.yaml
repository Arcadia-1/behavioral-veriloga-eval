syntax:
  must_include:
    - "@(cross("
    - "@(timer("
    - "transition("
    - "decay"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "sample_event_captures_high_hold_level"
    - "safe_window_vout_decays_monotonically"
    - "reset_window_clears_output_near_zero"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: buggy source omits the leakage decay multiply."
parity:
  required: true
  tolerance_notes: "Decay is checked with safe-time monotonic/value windows, not exact timer-boundary samples."
