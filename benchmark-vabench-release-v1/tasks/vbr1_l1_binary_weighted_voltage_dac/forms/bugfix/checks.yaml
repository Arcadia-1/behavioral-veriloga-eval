syntax:
  must_include:
    - "transition("
    - "/15.0"
  must_not_include:
    - "I("
    - "ddt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "sampled_codes_0_2_4_6_8_10_12_15_match_ideal_levels"
    - "monotonic_output"
    - "full_scale_code_reaches_vref"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: endpoint scaling denominator is 16 instead of 15."
parity:
  required: true
  tolerance_notes: "Sample points are centered in stable code windows."
