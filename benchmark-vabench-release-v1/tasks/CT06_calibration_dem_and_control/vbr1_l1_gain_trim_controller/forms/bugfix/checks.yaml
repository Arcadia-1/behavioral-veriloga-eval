syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "target"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "reset_restores_nominal_gain_control"
    - "low_measurement_window_increases_gain_control"
    - "high_measurement_window_decreases_gain_control"
    - "gain_control_reaches_high_and_low_clamps"
  sample_times_ns:
    - 20
    - 70
    - 150
    - 250
    - 310
    - 470
    - 590
    - 610
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: measurement-error update direction is reversed."
parity:
  reference: "spectre"
  status: "pending_until_evas_spectre_rerun"
  notes:
    - "Requires fresh EVAS/Spectre dual validation after CT06 content repair."
