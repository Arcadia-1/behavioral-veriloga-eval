tb_compile:
  backend: "evas"
sim_correct:
  dut_companion_role: "function_checked_dut"
  strong_benchmark_claim: true
  checks:
    - "pointer_advances_by_sampled_input_code"
    - "cell_enable_window_matches_effective_code_plus_lsb_boundary"
