syntax:
  must_include:
    - "@(cross("
    - "transition("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "frame_pulse_present_for_each_loaded_word"
    - "serialized_bits_and_word_monitor_match_expected_words"
    - "word_ok_pulses_and_frame_error_stays_low"

parity:
  required: true
  tolerance_notes: "Task-aware parity compares frame pulses, serialized words, reconstructed-word monitor levels, word_ok pulses, and frame_error behavior."
