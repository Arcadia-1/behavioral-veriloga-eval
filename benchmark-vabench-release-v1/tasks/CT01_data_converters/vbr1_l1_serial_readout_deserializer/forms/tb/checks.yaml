syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "ahdl_include"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "frame_starts_msb_first_word_capture"
    - "word_valid_after_four_serial_bits"
    - "word_monitor_matches_reconstructed_words"
parity:
  required: true
  tolerance_notes: "Checks sample settled public observables away from clock and load transitions."
