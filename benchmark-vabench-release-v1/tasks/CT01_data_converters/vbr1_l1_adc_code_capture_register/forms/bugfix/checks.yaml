syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "ahdl_include"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "load_captures_parallel_conversion_code"
    - "held_code_remains_stable_between_loads"
    - "overrange_flag_tracks_clip_inputs"
parity:
  required: true
  tolerance_notes: "Checks sample settled public observables away from clock and load transitions."
