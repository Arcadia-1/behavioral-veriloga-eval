syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "state"
    - "RDY"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "rdy_low_after_third_decision_edge_at_126ns"
    - "rdy_high_after_fourth_decision_edge_at_176ns"
    - "final_dac_code_matches_comparator_sequence_1010"
    - "rdy_clears_when_next_conversion_starts"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: RDY/EOC is asserted one CLKS rising edge early."
parity:
  required: true
  tolerance_notes: "Sample RDY and DAC outputs 5ns after clock edges, away from transition boundaries."
