syntax:
  must_include:
    - "@(cross("
    - "transition("
    - "UP"
    - "DN"
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "short_up_pulses_present_for_small_phase_error"
    - "up_dn_overlap_not_sustained"
    - "dn_not_sustained_for_ref_leading_div_stimulus"
parity:
  required: true
  tolerance_notes: "Checks pulse fractions and overlap bounds instead of exact threshold-crossing sample values."
