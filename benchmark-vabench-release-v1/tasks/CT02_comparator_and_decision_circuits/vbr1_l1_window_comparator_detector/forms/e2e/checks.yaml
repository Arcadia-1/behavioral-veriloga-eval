syntax:
  must_include:
    - "@(cross("
    - "transition("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "true_window_comparator"
parity:
  required: true
  tolerance_notes: "Task-aware parity compares the two in-window output pulses against the lower and upper threshold crossings."
time_refinement:
  method: bound_step_guard
  guards:
    - signal: vin
      ref: VSS
      threshold: 0.6
      window_v: 0.04
      near_step: 1p
    - signal: vin
      ref: VSS
      threshold: 0.3
      window_v: 0.04
      near_step: 1p
    - signal: out
      ref: VSS
      threshold: 0.45
      window_v: 0.08
      near_step: 1p
