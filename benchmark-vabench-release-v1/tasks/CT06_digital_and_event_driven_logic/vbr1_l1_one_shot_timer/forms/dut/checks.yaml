syntax:
  must_include:
    - "@(cross("
    - "@(timer("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
    - "idt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "pulse_goes_high_after_trigger"
    - "pulse_width_about_8ns"
    - "reset_keeps_pulse_low"
parity:
  required: true
  tolerance_notes: "Use pulse windows with tolerance around the programmed 8 ns width."
