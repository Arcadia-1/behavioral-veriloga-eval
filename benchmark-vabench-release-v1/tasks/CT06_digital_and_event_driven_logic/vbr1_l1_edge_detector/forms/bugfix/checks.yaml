syntax:
  must_include:
    - "@(cross("
    - "@(timer("
    - "transition("
  must_not_include:
    - "I("
    - "ddt("
dut_compile:
  backend: "evas"
tb_compile:
  backend: "evas"
sim_correct:
  checks:
    - "pulse_high_at_safe_windows_after_rising_sig_edges"
    - "pulse_low_before_next_falling_edge_windows"
    - "reset_keeps_pulse_low_before_release"
bugfix:
  buggy_expected: "FAIL_SIM_CORRECTNESS"
  fixed_expected: "PASS"
  reconstruction_note: "Single-root-cause badcase: the one-shot watches falling sig crossings."
parity:
  required: true
  tolerance_notes: "Pulse assertions use fixed safe-time samples away from edge and timer boundaries."
