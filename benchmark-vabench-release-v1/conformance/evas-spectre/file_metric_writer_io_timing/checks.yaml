asset_type: evas_spectre_conformance
semantic_axis: checker-semantics
expected_relation: binary_outcome_equal
origin:
  source_main120_id: vbm1_file_metric_writer_bugfix
gold_sources:
  - gold/file_metric_writer.va
  - gold/tb_file_metric_writer_ref.scs
  - gold/expected_metric.out
compile:
  evas: pass
  spectre: pass
simulation:
  required_outputs:
    - tran_csv
    - metric.out
checks:
  - name: single_metric_record
    intent: "Exactly one metric record is produced by the first rising crossing."
    artifact: metric.out
    expected_records: 1
  - name: first_cross_time
    intent: "The recorded crossing time is approximately 30.5 ns."
    metric: first_numeric_token_after_cross
    expected_time_s: 3.05e-8
    tolerance_s: 1.0e-12
  - name: done_flag_after_write
    intent: "The voltage done flag is low before the crossing and high afterward."
    signal: done
    low_before_s: 3.0e-8
    high_after_s: 3.2e-8
not_benchmark_task_reason: "This validates simulator file I/O and checker artifact handling, not a public bugfix capability row."
runner_hook_needed: "Add an EVAS/Spectre conformance runner that captures run-directory file artifacts and compares structured metric values."
